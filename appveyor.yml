  - set QTDIR=C:\Qt\6.9.3\mingw_64
  - set PATH=C:\msys64\mingw64\bin;%QTDIR%\bin;"C:\\Program Files (x86)\\Inno Setup 6";%PATH%
  - copy "%QTDIR%\libstdc++-6.dll" %QTDIR%\bin\
  - copy "%QTDIR%\libgcc*" %QTDIR%\bin\

